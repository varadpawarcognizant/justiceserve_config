eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

management:
  health:
    circuitbreakers:
      enabled: true # Enables the Circuit Breaker health group
  endpoint:
    health:
      show-details: always # Shows the details (state, failure rate) instead of just "UP"
  endpoints:
    web:
      exposure:
        include: health, metrics, circuitbreakers


